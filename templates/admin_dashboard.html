<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<a href="{{ url_for('logout') }}">Logout</a>

<h3>Users</h3>
<ul>
{% for user in users %}
    <li>{{ user.username }} - {{ user.role }}</li>
{% endfor %}
</ul>

<h3>Shops</h3>
<ul>
{% for shop in shops %}
    <li>{{ shop.name }} - {{ shop.area }}</li>
{% endfor %}
</ul>

</body>
</html>
