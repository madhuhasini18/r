{% extends "base.html" %}
{% block title %}Add Product – ShopWise{% endblock %}
{% block content %}
<div class="form-card" style="max-width:520px;">
  <h2>➕ Add Product</h2>
  <form method="POST">
    <div class="field-group"><label>Product Name</label>
      <input type="text" name="name" placeholder="e.g. Rice (5kg)" required/></div>
    <div class="field-group"><label>Category</label>
      <select name="category" required>
        <option value="">Select…</option>
        {% for c in ['Groceries','Dairy','Oils','Pulses','Personal Care','Beverages','Snacks','Other'] %}
          <option>{{ c }}</option>{% endfor %}
      </select></div>
    <div class="field-group"><label>Price (₹)</label>
      <input type="number" step="0.01" name="price" placeholder="e.g. 120.00" required/></div>
    <div class="field-group"><label>Availability</label>
      <select name="availability">
        <option value="1">✅ In Stock</option>
        <option value="0">❌ Out of Stock</option>
      </select></div>
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.4rem;">Add Product</button>
  </form>
  <p class="form-hint"><a href="/owner">← Back</a></p>
</div>
{% endblock %}
