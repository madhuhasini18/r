{% extends "base.html" %}
{% block title %}Edit Shop – ShopWise{% endblock %}
{% block content %}
<div class="form-card" style="max-width:560px;">
  <h2>✏️ Edit Shop Details</h2>
  <p style="color:var(--muted);font-size:.88rem;margin-bottom:1.4rem;">Update your shop information and location.</p>

  <form method="POST">
    <div style="background:#f8f6f2;border-radius:10px;padding:1.2rem 1.3rem;margin-bottom:1.2rem;border:1px solid var(--border);">
      <p style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:1rem;">🏪 Shop Details</p>
      <div class="field-group">
        <label>Shop Name</label>
        <input type="text" name="shop_name" value="{{ shop.name }}" required/>
      </div>
      <div class="field-group">
        <label>Area</label>
        <input type="text" name="area" value="{{ shop.area or '' }}"/>
      </div>
      <div class="field-group" style="margin-bottom:0;">
        <label>Full Address</label>
        <input type="text" name="address" value="{{ shop.address or '' }}" required/>
      </div>
    </div>

    <div style="background:#f8f6f2;border-radius:10px;padding:1.2rem 1.3rem;margin-bottom:1.2rem;border:1px solid var(--border);">
      <p style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:1rem;">📍 Location</p>
      <div style="display:flex;gap:.6rem;margin-bottom:.8rem;align-items:flex-end;">
        <div class="field-group" style="flex:1;margin-bottom:0;">
          <label>Search Address</label>
          <input type="text" id="locSearch" placeholder="Type to geocode…" oninput="geocodeShop(this.value)"/>
        </div>
        <button type="button" class="detect-btn" onclick="detectGPS()">📡 GPS</button>
      </div>
      <div id="coordHint" style="display:none;font-size:.8rem;color:green;margin-bottom:.7rem;"></div>
      <div style="display:flex;gap:.7rem;">
        <div class="field-group" style="flex:1;margin-bottom:0;">
          <label>Latitude</label>
          <input type="number" step="any" name="lat" id="lat" value="{{ shop.lat }}" required/>
        </div>
        <div class="field-group" style="flex:1;margin-bottom:0;">
          <label>Longitude</label>
          <input type="number" step="any" name="lon" id="lon" value="{{ shop.lon }}" required/>
        </div>
      </div>
      <div style="margin-top:.8rem;">
        <div style="display:flex;gap:.4rem;flex-wrap:wrap;">
          <button type="button" class="btn btn-secondary btn-sm" onclick="fillCoords(17.4956,78.3694,'Miyapur')">Miyapur</button>
          <button type="button" class="btn btn-secondary btn-sm" onclick="fillCoords(17.4870,78.3911,'KPHB')">KPHB</button>
          <button type="button" class="btn btn-secondary btn-sm" onclick="fillCoords(17.4849,78.4138,'Kukatpally')">Kukatpally</button>
          <button type="button" class="btn btn-secondary btn-sm" onclick="fillCoords(17.4700,78.3600,'Kondapur')">Kondapur</button>
          <button type="button" class="btn btn-secondary btn-sm" onclick="fillCoords(17.4374,78.4487,'Ameerpet')">Ameerpet</button>
          <button type="button" class="btn btn-secondary btn-sm" onclick="fillCoords(17.4401,78.3489,'Gachibowli')">Gachibowli</button>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:.7rem;">
      <a href="/owner" class="btn btn-secondary" style="flex:1;text-align:center;">← Cancel</a>
      <button type="submit" class="btn btn-primary" style="flex:2;">Save Changes</button>
    </div>
  </form>
</div>

<script>
function fillCoords(lat, lon, name) {
  document.getElementById('lat').value = lat;
  document.getElementById('lon').value = lon;
  const h = document.getElementById('coordHint');
  h.style.display='block'; h.textContent='✅ '+name;
}
function detectGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    p => fillCoords(p.coords.latitude.toFixed(6), p.coords.longitude.toFixed(6), 'GPS location'),
    () => alert('Could not detect.'), { timeout:8000 }
  );
}
let t;
function geocodeShop(v) {
  clearTimeout(t);
  if (v.length < 5) return;
  t = setTimeout(() => {
    fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(v)}&format=json&limit=1`)
      .then(r=>r.json()).then(d => {
        if (d&&d[0]) fillCoords(parseFloat(d[0].lat).toFixed(6), parseFloat(d[0].lon).toFixed(6), d[0].display_name.split(',').slice(0,2).join(','));
      }).catch(()=>{});
  }, 800);
}
</script>
{% endblock %}
