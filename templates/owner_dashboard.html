<!DOCTYPE html>
<html>
<head>
    <title>Seller Dashboard - ShopWise</title>
</head>
<body>

<h2>{{ shop.name }} - Dashboard</h2>

<a href="{{ url_for('logout') }}">Logout</a>

<hr>

<h3>Add New Product</h3>

<form method="POST" action="{{ url_for('add_product') }}">
    <input type="text" name="name" placeholder="Product Name" required><br><br>
    <input type="text" name="category" placeholder="Category" required><br><br>
    <input type="number" name="price" placeholder="Price" step="0.01" required><br><br>

    <button type="submit">Add Product</button>
</form>

<hr>

<h3>Your Products</h3>

<ul>
{% for product in products %}
    <li>{{ product.name }} - ₹{{ product.price }}</li>
{% else %}
    <li>No products added yet.</li>
{% endfor %}
</ul>

</body>
</html>
