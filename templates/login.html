{% extends "base.html" %}
{% block title %}Login – ShopWise{% endblock %}
{% block content %}
<div class="form-card">
  <h2>👋 Welcome back</h2>
  <form method="POST">
    <div class="field-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required/>
    </div>
    <div class="field-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required/>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.4rem;">Login</button>
  </form>
  <p class="form-hint" style="margin-top:1.1rem;">No account? <a href="/register">Register here</a></p>
  <hr class="divider"/>
  <p style="font-size:.78rem;color:var(--muted);text-align:center;">
    <strong>Demo:</strong> admin / admin123 &nbsp;|&nbsp; owner1 / pass1
  </p>
</div>
{% endblock %}
